[build-system]
requires = ["setuptools>=64", "pybind11>=2.12"]
build-backend = "setuptools.build_meta"

[project]
name = "pyOrigami"
version = "0.1.0"
description = "Python interface to the Doodle origami diagram tool"
requires-python = ">=3.9"

[tool.setuptools.packages.find]
include = ["pydoodle*"]

[tool.cibuildwheel]
build = "cp39-* cp310-* cp311-* cp312-* cp313-*"
skip = "*-musllinux_*"
